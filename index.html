<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rollcall Kehadiran — IKM Lumut</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root{
  --bg:#eef1f7; --card:#fff; --ink:#0e2a5e; --muted:#6a7488;
  --line:#e0e5ef; --accent:#1c5196; --accent-d:#143c82; --red:#d42027;
  --hadir:#16a34a; --lewat:#d97706; --tidak:#dc2626;
  --radius:14px; --sh:0 1px 3px rgba(14,42,94,.06),0 6px 20px rgba(14,42,94,.06);
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none}
input,select{font-family:inherit;font-size:15px}
.hidden{display:none!important}
.wrap{max-width:1000px;margin:0 auto;padding:16px}
.muted{color:var(--muted)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.grow{flex:1}
h1,h2,h3{margin:0}
/* buttons */
.btn{background:var(--accent);color:#fff;padding:11px 16px;border-radius:10px;font-weight:600;font-size:15px}
.btn:hover{background:var(--accent-d)}
.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
.btn.ghost:hover{background:#f5f8f7}
.btn.sm{padding:7px 12px;font-size:13px;border-radius:8px}
.btn.danger{background:#fff;color:var(--tidak);border:1px solid #f3cccc}
.field{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:#fff;outline:none}
.field:focus{border-color:var(--accent)}
label.lbl{font-size:13px;font-weight:600;color:var(--muted);display:block;margin:0 0 5px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--sh);padding:18px}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 9px;border-radius:99px;background:#eaf3ef;color:var(--accent-d)}
/* login */
.login-screen{min-height:100vh;display:grid;place-items:center;padding:20px;
  background:radial-gradient(1200px 520px at 50% -12%,#dbe4f5 0%,var(--bg) 62%)}
.login-box{width:100%;max-width:410px}
.brand-logo{display:flex;justify-content:center;margin-bottom:6px}
.brand-logo img{width:230px;max-width:78%;height:auto}
.brand-title{text-align:center;font-size:15px;font-weight:600;letter-spacing:2px;
  text-transform:uppercase;color:var(--muted);margin:2px 0 22px;position:relative}
.brand-title:after{content:"";display:block;width:46px;height:3px;border-radius:2px;
  background:var(--red);margin:9px auto 0}
.foot-logos{display:flex;align-items:center;justify-content:center;gap:9px;margin-top:16px}
.foot-logos img{height:34px;width:auto;opacity:.9}
.brand{display:flex;align-items:center;gap:11px;margin-bottom:22px;justify-content:center}
.brand .mark{width:42px;height:42px;border-radius:12px;background:var(--accent);color:#fff;display:grid;place-items:center;font-weight:800;font-size:20px;box-shadow:var(--sh)}
.brand b{font-size:19px;letter-spacing:-.3px}
.tabs{display:flex;background:#e7efec;border-radius:11px;padding:4px;margin-bottom:18px}
.tabs button{flex:1;padding:9px;border-radius:8px;background:transparent;font-weight:600;color:var(--muted);font-size:14px}
.tabs button.on{background:#fff;color:var(--ink);box-shadow:var(--sh)}
/* topbar */
.top{background:var(--ink);color:#fff;border-bottom:3px solid var(--red)}
.top .wrap{display:flex;align-items:center;gap:12px;padding:13px 16px}
.top .mark{background:#fff;border-radius:8px;padding:5px 9px;display:flex;align-items:center}
.top .mark img{height:20px;width:auto;display:block}
.top b{font-size:15px}
.top .who{margin-left:auto;font-size:13px;opacity:.85;text-align:right;line-height:1.3}
/* admin nav */
.nav{display:flex;gap:6px;overflow:auto;padding:12px 0 4px}
.nav button{white-space:nowrap;padding:9px 14px;border-radius:9px;background:#fff;border:1px solid var(--line);font-weight:600;font-size:14px;color:var(--muted)}
.nav button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
/* roll list */
.stu{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.stu:last-child{border:none}
.stu .n{width:26px;text-align:center;color:var(--muted);font-weight:600;font-size:13px}
.stu .nm{flex:1;font-weight:600;font-size:15px}
.seg{display:flex;background:#f1f5f3;border-radius:9px;padding:3px;gap:3px}
.seg button{padding:7px 11px;border-radius:7px;font-size:13px;font-weight:600;background:transparent;color:var(--muted)}
.seg button.hadir.on{background:var(--hadir);color:#fff}
.seg button.lewat.on{background:var(--lewat);color:#fff}
.seg button.tidak.on{background:var(--tidak);color:#fff}
/* table */
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--line)}
th{font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
.tag{font-size:12px;font-weight:600;padding:3px 9px;border-radius:99px}
.tag.hadir{background:#e7f6ec;color:var(--hadir)}
.tag.lewat{background:#fdf0dd;color:var(--lewat)}
.tag.tidak{background:#fbe4e4;color:var(--tidak)}
.stat{flex:1;min-width:110px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px}
.stat .v{font-size:26px;font-weight:800;letter-spacing:-1px}
.stat .l{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.mono{font-family:ui-monospace,Menlo,monospace;font-weight:600}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
  padding:12px 18px;border-radius:11px;font-weight:600;font-size:14px;box-shadow:var(--sh);z-index:99;opacity:0;transition:.25s}
.toast.show{opacity:1;bottom:28px}
.sub{font-size:13px;color:var(--muted);margin-top:3px}
@media(max-width:520px){.seg button{padding:7px 8px;font-size:12px}.stu{flex-wrap:wrap}.stu .seg{width:100%}}
</style>
</head>

<script>
// ============ CONFIG — ISI DUA BARIS INI ============
const SUPABASE_URL = "https://YOUR-PROJECT.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRucnJ6bG5yeXBvZnNxc2xuZ3lnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0NTMzMDcsImV4cCI6MjA5OTAyOTMwN30.0dMF-YRx81jMou87g_FoM2-pacwTDP8RJcWQN6JvIrU";
// ====================================================

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let session = null;          // {type:'ketua'|'admin', ...}
let rollStudents = [], rollState = {};
let lastReport = [];

const $ = s => document.querySelector(s);
const toast = m => { const t=$("#toast"); t.textContent=m; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2200); };
const esc = s => (s??"").toString().replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
const today = () => new Date().toISOString().slice(0,10);
const cap = s => s.charAt(0).toUpperCase()+s.slice(1);

/* ---------- LOGIN ---------- */
function switchTab(t){
  $("#tabKetua").classList.toggle("on",t==='ketua');
  $("#tabAdmin").classList.toggle("on",t==='admin');
  $("#formKetua").classList.toggle("hidden",t!=='ketua');
  $("#formAdmin").classList.toggle("hidden",t!=='admin');
  $("#loginErr").textContent="";
}
async function loginKetua(){
  const id=$("#kId").value.trim(), pin=$("#kPin").value.trim();
  if(!id||!pin) return $("#loginErr").textContent="Isi ID dan PIN.";
  const {data} = await sb.from("monitors").select("*,classes(*)").eq("login_id",id).eq("pin",pin).maybeSingle();
  if(!data) return $("#loginErr").textContent="ID atau PIN salah.";
  session={type:'ketua',...data};
  $("#login").classList.add("hidden"); $("#ketuaPanel").classList.remove("hidden");
  $("#kWho").textContent=data.name+" · "+cap(data.role);
  $("#kClass").textContent="Kelas "+data.classes.name+" (Sem "+data.classes.semester+")";
  $("#kDate").value=today(); loadRoll();
}
async function loginAdmin(){
  const u=$("#aUser").value.trim(), p=$("#aPass").value.trim();
  const {data}=await sb.from("admins").select("*").eq("username",u).eq("password",p).maybeSingle();
  if(!data) return $("#loginErr").textContent="Username atau password salah.";
  session={type:'admin',...data};
  $("#login").classList.add("hidden"); $("#adminPanel").classList.remove("hidden");
  $("#aWho").textContent=data.name;
  initAdmin();
}
function logout(){ location.reload(); }

/* ---------- KETUA: ROLLCALL ---------- */
async function loadRoll(){
  const cid=session.class_id, d=$("#kDate").value||today();
  const {data:st}=await sb.from("students").select("*").eq("class_id",cid).order("no");
  const {data:at}=await sb.from("attendance").select("*").eq("class_id",cid).eq("date",d);
  rollStudents=st||[]; rollState={};
  (at||[]).forEach(a=>rollState[a.student_id]=a.status);
  rollStudents.forEach(s=>{ if(!rollState[s.id]) rollState[s.id]='hadir'; });
  renderRoll();
}
function renderRoll(){
  if(!rollStudents.length){ $("#rollList").innerHTML='<p class="muted">Tiada pelajar dalam kelas ini lagi. Minta pensyarah tambah.</p>'; updateCount(); return; }
  $("#rollList").innerHTML=rollStudents.map(s=>{
    const v=rollState[s.id];
    const b=(k,l)=>`<button class="${k} ${v===k?'on':''}" onclick="setStatus(${s.id},'${k}')">${l}</button>`;
    return `<div class="stu"><div class="n">${s.no||''}</div><div class="nm">${esc(s.name)}</div>
      <div class="seg">${b('hadir','Hadir')}${b('lewat','Lewat')}${b('tidak_hadir','Tak Hadir')}</div></div>`;
  }).join("");
  updateCount();
}
function setStatus(id,st){ rollState[id]=st; renderRoll(); }
function markAll(st){ rollStudents.forEach(s=>rollState[s.id]=st); renderRoll(); }
function updateCount(){
  let h=0,l=0,t=0; Object.values(rollState).forEach(v=>{if(v==='hadir')h++;else if(v==='lewat')l++;else t++;});
  $("#cH").textContent=h; $("#cL").textContent=l; $("#cT").textContent=t;
}
async function saveRoll(){
  const d=$("#kDate").value||today();
  const rows=rollStudents.map(s=>({student_id:s.id,class_id:session.class_id,date:d,status:rollState[s.id],recorded_by:session.name}));
  if(!rows.length) return;
  const {error}=await sb.from("attendance").upsert(rows,{onConflict:'student_id,date'});
  toast(error?("Gagal: "+error.message):"Kehadiran disimpan ✓");
}

/* ---------- ADMIN INIT ---------- */
function adminTab(t){
  document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("on",b.dataset.t===t));
  ["kelas","ketua","rekod","laporan"].forEach(x=>{
    const id={kelas:"#tabKelas",ketua:"#tabKetua2",rekod:"#tabRekod",laporan:"#tabLaporan"}[x];
    $(id).classList.toggle("hidden",x!==t);
  });
  if(t==='ketua') loadMonitors();
  if(t==='rekod') loadRekod();
  if(t==='laporan') fillLapSem();
}
async function initAdmin(){ await refreshClasses(); loadStudents(); }

let CLASSES=[];
async function refreshClasses(){
  const {data}=await sb.from("classes").select("*").order("semester").order("name");
  CLASSES=data||[];
  const opts=CLASSES.map(c=>`<option value="${c.id}">Sem ${c.semester} — ${esc(c.name)}</option>`).join("");
  ["#selClass","#mClass","#rClass"].forEach(id=>{ const el=$(id); if(el) el.innerHTML=opts; });
}
async function addClass(){
  const sem=parseInt($("#cSem").value), name=$("#cName").value.trim();
  if(!sem||!name) return toast("Isi semester & nama kelas.");
  const {error}=await sb.from("classes").insert({semester:sem,name});
  if(error) return toast("Gagal: "+error.message);
  $("#cName").value=""; await refreshClasses(); loadStudents(); toast("Kelas ditambah ✓");
}

/* ---------- STUDENTS ---------- */
async function loadStudents(){
  const cid=$("#selClass").value; if(!cid){ $("#stuTable").innerHTML=""; return; }
  const {data}=await sb.from("students").select("*").eq("class_id",cid).order("no");
  if(!data||!data.length){ $("#stuTable").innerHTML='<p class="muted">Tiada pelajar lagi.</p>'; return; }
  $("#stuTable").innerHTML=`<table><thead><tr><th>#</th><th>Nama</th><th>Matrik</th><th></th></tr></thead><tbody>`+
    data.map(s=>`<tr><td>${s.no||''}</td><td>${esc(s.name)}</td><td class="muted">${esc(s.matric)||'-'}</td>
      <td style="text-align:right"><button class="btn danger sm" onclick="delStudent(${s.id})">Buang</button></td></tr>`).join("")+
    `</tbody></table>`;
}
async function nextNo(cid){
  const {data}=await sb.from("students").select("no").eq("class_id",cid).order("no",{ascending:false}).limit(1);
  return (data&&data[0]&&data[0].no?data[0].no:0)+1;
}
async function addStudent(){
  const cid=$("#selClass").value, name=$("#sName").value.trim(), mat=$("#sMat").value.trim();
  if(!cid) return toast("Pilih kelas dulu."); if(!name) return toast("Isi nama.");
  const no=await nextNo(cid);
  const {error}=await sb.from("students").insert({class_id:cid,name,matric:mat||null,no});
  if(error) return toast("Gagal: "+error.message);
  $("#sName").value="";$("#sMat").value=""; loadStudents(); toast("Ditambah ✓");
}
async function bulkAdd(){
  const cid=$("#selClass").value; if(!cid) return toast("Pilih kelas dulu.");
  const lines=$("#bulk").value.split("\n").map(l=>l.trim()).filter(Boolean);
  if(!lines.length) return toast("Kosong.");
  let no=await nextNo(cid);
  const rows=lines.map(l=>{const p=l.split(",");return{class_id:cid,name:p[0].trim(),matric:(p[1]||"").trim()||null,no:no++};});
  const {error}=await sb.from("students").insert(rows);
  if(error) return toast("Gagal: "+error.message);
  $("#bulk").value=""; loadStudents(); toast(rows.length+" pelajar ditambah ✓");
}
async function delStudent(id){ if(!confirm("Buang pelajar ini?"))return;
  await sb.from("students").delete().eq("id",id); loadStudents(); }

/* ---------- MONITORS (KETUA) ---------- */
async function addMonitor(){
  const cid=$("#mClass").value, name=$("#mName").value.trim(), role=$("#mRole").value;
  if(!cid||!name) return toast("Pilih kelas & isi nama.");
  const cls=CLASSES.find(c=>c.id==cid);
  const {count}=await sb.from("monitors").select("*",{count:'exact',head:true}).eq("class_id",cid).eq("role",role);
  const letter=role==='ketua'?'K':'P';
  const login_id=`${cls.name}-${letter}${(count||0)+1}`;
  const pin=(""+Math.floor(1000+Math.random()*9000));
  const {error}=await sb.from("monitors").insert({class_id:cid,name,role,login_id,pin});
  if(error) return toast("Gagal: "+error.message);
  $("#mName").value=""; loadMonitors(); toast("Dilantik ✓ ID: "+login_id);
}
async function loadMonitors(){
  const {data}=await sb.from("monitors").select("*,classes(name,semester)").order("class_id");
  if(!data||!data.length){ $("#monTable").innerHTML='<p class="muted">Belum ada ketua dilantik.</p>'; return; }
  $("#monTable").innerHTML=`<table><thead><tr><th>Kelas</th><th>Nama</th><th>Peranan</th><th>ID Login</th><th>PIN</th><th></th></tr></thead><tbody>`+
    data.map(m=>`<tr><td>${esc(m.classes.name)}</td><td>${esc(m.name)}</td><td>${cap(m.role)}</td>
      <td><span class="mono">${m.login_id}</span></td><td class="mono">${m.pin}</td>
      <td style="text-align:right">
        <button class="btn ghost sm" onclick="copyCred('${m.login_id}','${m.pin}')">Salin</button>
        <button class="btn danger sm" onclick="delMonitor(${m.id})">Buang</button></td></tr>`).join("")+
    `</tbody></table>`;
}
function copyCred(id,pin){ navigator.clipboard.writeText(`ID Ketua: ${id}\nPIN: ${pin}`); toast("Disalin ✓"); }
async function delMonitor(id){ if(!confirm("Buang ketua ini?"))return;
  await sb.from("monitors").delete().eq("id",id); loadMonitors(); }

/* ---------- REKOD KEHADIRAN (admin view/edit) ---------- */
async function loadRekod(){
  const cid=$("#rClass").value; if(!$("#rDate").value)$("#rDate").value=today();
  const d=$("#rDate").value; if(!cid){$("#rekodTable").innerHTML="";return;}
  const {data:st}=await sb.from("students").select("*").eq("class_id",cid).order("no");
  const {data:at}=await sb.from("attendance").select("*").eq("class_id",cid).eq("date",d);
  const map={}; (at||[]).forEach(a=>map[a.student_id]=a.status);
  if(!st||!st.length){ $("#rekodTable").innerHTML='<p class="muted">Tiada pelajar.</p>'; return; }
  $("#rekodTable").innerHTML=`<table><thead><tr><th>#</th><th>Nama</th><th>Status</th></tr></thead><tbody>`+
    st.map(s=>{const v=map[s.id]; const t=v?`<span class="tag ${v==='tidak_hadir'?'tidak':v}">${v==='tidak_hadir'?'Tak Hadir':cap(v)}</span>`:'<span class="muted">— belum direkod</span>';
      return `<tr><td>${s.no||''}</td><td>${esc(s.name)}</td><td>${t}</td></tr>`;}).join("")+`</tbody></table>`;
}
async function exportRekod(){
  const cid=$("#rClass").value,d=$("#rDate").value;
  const {data:st}=await sb.from("students").select("*").eq("class_id",cid).order("no");
  const {data:at}=await sb.from("attendance").select("*").eq("class_id",cid).eq("date",d);
  const map={}; (at||[]).forEach(a=>map[a.student_id]=a.status);
  const rows=[["No","Nama","Matrik","Tarikh","Status"]].concat((st||[]).map(s=>[s.no,s.name,s.matric||"",d,map[s.id]||"tiada"]));
  downloadCSV(rows,`kehadiran_${d}.csv`);
}

/* ---------- LAPORAN ---------- */
function fillLapSem(){
  const sems=[...new Set(CLASSES.map(c=>c.semester))].sort();
  $("#lSem").innerHTML='<option value="">Semua</option>'+sems.map(s=>`<option value="${s}">Semester ${s}</option>`).join("");
  fillLapClass();
}
function fillLapClass(){
  const sem=$("#lSem").value;
  const list=sem?CLASSES.filter(c=>c.semester==sem):CLASSES;
  $("#lClass").innerHTML='<option value="">Semua kelas</option>'+list.map(c=>`<option value="${c.id}">Sem ${c.semester} — ${esc(c.name)}</option>`).join("");
}
async function runReport(){
  let q=sb.from("students").select("*,classes(name,semester)");
  const cid=$("#lClass").value, sem=$("#lSem").value;
  if(cid) q=q.eq("class_id",cid);
  const {data:st}=await q; let students=st||[];
  if(!cid&&sem) students=students.filter(s=>s.classes.semester==sem);
  if(!students.length){ $("#lapStats").innerHTML='<p class="muted">Tiada data.</p>'; $("#lapTable").innerHTML=""; return; }
  const ids=students.map(s=>s.id);
  const {data:at}=await sb.from("attendance").select("*").in("student_id",ids);
  const per={}; students.forEach(s=>per[s.id]={s,h:0,l:0,t:0});
  (at||[]).forEach(a=>{ if(!per[a.student_id])return; const p=per[a.student_id];
    if(a.status==='hadir')p.h++; else if(a.status==='lewat')p.l++; else p.t++; });
  lastReport=Object.values(per).map(p=>{const tot=p.h+p.l+p.t; const rate=tot?Math.round((p.h+p.l)/tot*100):0;
    return {name:p.s.name,cls:p.s.classes.name,h:p.h,l:p.l,t:p.t,tot,rate};});
  lastReport.sort((a,b)=>a.rate-b.rate);
  // stats
  let H=0,L=0,T=0; lastReport.forEach(r=>{H+=r.h;L+=r.l;T+=r.t;});
  const tot=H+L+T, avg=lastReport.length?Math.round(lastReport.reduce((a,r)=>a+r.rate,0)/lastReport.length):0;
  $("#lapStats").innerHTML=`
    <div class="stat"><div class="v">${students.length}</div><div class="l">Pelajar</div></div>
    <div class="stat"><div class="v" style="color:var(--accent)">${avg}%</div><div class="l">Purata Kehadiran</div></div>
    <div class="stat"><div class="v" style="color:var(--hadir)">${H}</div><div class="l">Hadir</div></div>
    <div class="stat"><div class="v" style="color:var(--lewat)">${L}</div><div class="l">Lewat</div></div>
    <div class="stat"><div class="v" style="color:var(--tidak)">${T}</div><div class="l">Tak Hadir</div></div>`;
  drawChart(lastReport);
  // table (paling rendah dulu = perlu perhatian)
  $("#lapTable").innerHTML=`<table><thead><tr><th>Nama</th><th>Kelas</th><th>Hadir</th><th>Lewat</th><th>Tak Hadir</th><th>% Kehadiran</th></tr></thead><tbody>`+
    lastReport.map(r=>{const c=r.rate<70?'var(--tidak)':r.rate<85?'var(--lewat)':'var(--hadir)';
      return `<tr><td>${esc(r.name)}</td><td class="muted">${esc(r.cls)}</td><td>${r.h}</td><td>${r.l}</td><td>${r.t}</td>
      <td style="font-weight:700;color:${c}">${r.rate}%</td></tr>`;}).join("")+`</tbody></table>`;
}
let chart;
function drawChart(rep){
  const top=rep.slice(0,15);
  if(chart) chart.destroy();
  chart=new Chart($("#chart"),{type:'bar',data:{labels:top.map(r=>r.name),
    datasets:[{label:'% Kehadiran',data:top.map(r=>r.rate),
      backgroundColor:top.map(r=>r.rate<70?'#dc2626':r.rate<85?'#d97706':'#16a34a'),borderRadius:6}]},
    options:{plugins:{legend:{display:false},title:{display:true,text:'Kehadiran terendah (perlu perhatian)'}},
      scales:{y:{max:100,ticks:{callback:v=>v+'%'}}}}});
}
function exportReport(){
  if(!lastReport.length) return toast("Jana laporan dulu.");
  const rows=[["Nama","Kelas","Hadir","Lewat","Tak Hadir","Jumlah Rekod","% Kehadiran"]]
    .concat(lastReport.map(r=>[r.name,r.cls,r.h,r.l,r.t,r.tot,r.rate+"%"]));
  downloadCSV(rows,"laporan_kehadiran.csv");
}
function downloadCSV(rows,fn){
  const csv=rows.map(r=>r.map(c=>`"${(c??"").toString().replace(/"/g,'""')}"`).join(",")).join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"})); a.download=fn; a.click();
}
</script>
</body>
